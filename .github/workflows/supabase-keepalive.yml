name: Supabase keep-alive

# Supabase free-tier projects are paused after ~7 days of no activity. This makes a
# real REST query against the database on a daily schedule so the project never
# crosses the inactivity threshold. Runs entirely on GitHub's schedule — no local
# machine required.
#
# The values below are the PUBLIC client credentials (the same project URL +
# publishable/anon key that ship in the built frontend). They are safe to commit;
# row-level security still protects the data.

on:
  schedule:
    # Daily at 06:17 UTC (offset from the top of the hour to dodge cron congestion).
    - cron: "17 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: "https://sokuvssuuightppxlqoi.supabase.co"
      SUPABASE_KEY: "sb_publishable_5Od53rst3jlALvYZMtQ6yA_4akRCetI"
    steps:
      - name: Query the database
        run: |
          set -euo pipefail
          # cosmetics is a small, anon-readable catalog table — the select runs a real
          # query against Postgres and returns 200 (even when empty), which registers
          # as project activity and resets the inactivity timer.
          status=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/cosmetics?select=*&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "HTTP ${status}"
          cat /tmp/resp.txt
          # 2xx = the query executed against Postgres (RLS may return an empty array,
          # which still counts as activity). Anything else should fail the run so the
          # failure email surfaces the problem.
          case "${status}" in
            2*) echo "Keep-alive ping OK" ;;
            *)  echo "Unexpected status ${status}" >&2; exit 1 ;;
          esac
